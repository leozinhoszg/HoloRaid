<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <!--
    Ponte de callback OAuth (flutter_web_auth_2, fluxo popup no web).
    O Discord redireciona o POPUP para /?code=... . Este script roda ANTES do
    Flutter carregar: sinaliza a aba principal (que faz polling do localStorage)
    e fecha o popup. Funciona em dev (localhost) e prod sem alterar o redirect_uri.
  -->
  <script>
    (function () {
      var s = window.location.search || '';
      if (s.indexOf('code=') !== -1 || s.indexOf('error=') !== -1) {
        try { window.localStorage.setItem('flutter-web-auth-2', window.location.href); } catch (e) {}
        try { if (window.opener) window.opener.postMessage({ 'flutter-web-auth-2': window.location.href }, window.location.origin); } catch (e) {}
        window.close();
      }
    })();
  </script>

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="HoloRaid">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>HoloRaid</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
